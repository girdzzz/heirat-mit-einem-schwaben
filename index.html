<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Support Page</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      font-family: Arial, sans-serif;
      transition: background-color 0.5s ease;
    }

    img {
      max-width: 90vw;
      max-height: 60vh;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
    }

    .button {
      margin-top: 24px;
      padding: 16px 28px;
      font-size: 18px;
      border-radius: 999px;
      text-decoration: none;
      background: black;
      color: white;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <img id="randomImage" src="" alt="Random Image" />

  <a
    class="button"
    href="https://www.paypal.com/pool/9pCrpbAM3f?sr=ancr"
    target="_blank"
  >
    HILFE
  </a>

  <script>
    const colors = [
      "#FFB3BA",
      "#BAFFC9",
      "#BAE1FF",
      "#FFFFBA",
      "#D5BAFF",
      "#FFC6A5"
    ];

    const images = [
      "images/gib20.png",
      "images/mircostripper.png",
      "images/BrustOP.png",
      "images/COCKtail.png",
      "images/dubisteingeladen.png",
      "images/wuhu.png",
      "images/brautstyling.png",
      "images/domweihbraut.png",
      "images/shotspende.png"
    ];

    const randomColor =
      colors[Math.floor(Math.random() * colors.length)];

    const randomImage =
      images[Math.floor(Math.random() * images.length)];

    document.body.style.backgroundColor = randomColor;

    document.getElementById("randomImage").src = randomImage;
  </script>

</body>
</html>
